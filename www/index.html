<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Locolie</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      padding: 24px;
      text-align: center;
    }
    .mark { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; }
    .pin { color: #059669; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,.15);
      border-top-color: #059669;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .msg { color: rgba(255,255,255,.55); font-size: 14px; max-width: 260px; line-height: 1.5; }
    .retry {
      display: none;
      margin-top: 4px;
      padding: 11px 22px;
      background: #059669;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
    }
    .offline .spinner { display: none; }
    .offline .retry { display: inline-block; }
  </style>
</head>
<body>
  <div class="wrap" id="wrap">
    <div class="mark">L<span class="pin">o</span>colie</div>
    <div class="spinner"></div>
    <div class="msg" id="msg">Loading local offers near you...</div>
    <button class="retry" onclick="location.reload()">Try again</button>
  </div>
  <script>
    // If the live app hasn't taken over within a few seconds, assume offline.
    setTimeout(function () {
      document.getElementById('wrap').classList.add('offline');
      document.getElementById('msg').textContent =
        "Can't reach Locolie right now. Check your connection and try again.";
    }, 6000);
  </script>
</body>
</html>
